<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Input</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="glass-container page-wrapper">
        <header style="margin-bottom: 20px;">
            <h1>Daily Check-In</h1>
            <p>Enter your current glucose. We handle the rest.</p>
        </header>

        <form id="dailyInputForm" class="prediction-form" style="background: rgba(0,0,0,0.2); padding: 24px; border-radius: 12px;">
            <div class="input-group">
                <label>Current Glucose (mg/dL)</label>
                <input type="number" id="glucose" required style="font-size:1.5rem; text-align:center;">
            </div>
            
            <div class="input-group" style="margin-top:20px;">
                <label>Activity since last check-in (Optional)</label>
                <select id="activity">
                    <option value="Normal">Normal Day</option>
                    <option value="Workout">Workout / Heavy Activity</option>
                    <option value="Sedentary">Sedentary</option>
                </select>
            </div>
            
            <button type="submit" class="btn primary full-width" style="margin-top: 20px;">Check Risk</button>
        </form>

        <div style="text-align:center;">
            <a href="/setup" style="color:var(--text-muted); font-size:0.9rem;">Edit Routine Profile</a>
        </div>
    </div>

    <script>
        document.getElementById("dailyInputForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector("button");
            btn.innerText = "Analyzing...";
            btn.disabled = true;

            // Format: YYYY-MM-DDTHH:MM:SS locally
            const localFormat = new Date().toLocaleString("sv-SE").replace(' ', 'T');
            const payload = {
                glucose: document.getElementById("glucose").value,
                activity: document.getElementById("activity").value,
                client_time: localFormat
            };

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // If successful, pass data loosely to Dashboard via localStorage
            if(response.ok) {
                const result = await response.json();
                localStorage.setItem("lastPrediction", JSON.stringify(result));
                window.location.href = '/dashboard';
            } else {
                alert("Error making prediction");
                btn.innerText = "Check Risk";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
