<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            max-width: 800px;
        }
        .advice-box { background: rgba(0,0,0,0.2); padding:20px; border-radius:12px; margin-top:20px; width:100%; border:1px solid rgba(255,255,255,0.1); }
        .chart-container { width: 100%; height: 300px; margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>
    <div class="glass-container page-wrapper" style="max-width:800px;">
        <header>
            <h1>Status Dashboard</h1>
        </header>

        <div id="alertBox" class="alert-box" style="width: 100%; display:none;">
            <h3 id="alertTitle">⚠️ High Risk of Hypoglycemia</h3>
            <p>Your blood glucose is expected to drop dangerously low.</p>
        </div>

        <div class="results-grid" style="width:100%; grid-template-columns: 1fr 1fr;">
            <div class="stat-card" style="text-align:center;">
                <h3>Current Level</h3>
                <p id="resCurr" class="highlight">-</p>
                <span style="font-size:0.8rem; color:var(--text-muted);">mg/dL</span>
            </div>
            <div class="stat-card" style="text-align:center; border: 1px solid rgba(255,255,255,0.2);">
                <h3 style="color:#f8fafc;">Next Expected Dip Below 70</h3>
                <p id="resDipTime" class="highlight" style="font-size:1.5rem; color:#a855f7;">-</p>
            </div>
        </div>

        <div class="advice-box" id="adviceContainer">
            <h3 style="margin-bottom:10px;">Future Outlook</h3>
            <p id="resExplanation" class="text-sm" style="color:#cbd5e1;">-</p>
            
            <h3 style="margin-top:20px; margin-bottom:10px;">Recommended Action</h3>
            <p id="resSuggestion" class="text-sm" style="font-weight: 600;">-</p>
        </div>

        <div class="chart-container">
            <h3 style="font-size:1rem; margin-bottom:15px; font-weight:400;">12-Hour AI Trajectory Forecast</h3>
            <canvas id="dailyChart"></canvas>
        </div>

        <div style="display:flex; width:100%; gap:15px; margin-top:20px; flex-wrap:wrap;">
            <a href="/" class="btn secondary" style="flex:1; min-width: 150px;">Log New Reading</a>
            <a href="/setup" class="btn secondary" style="flex:1; min-width: 150px;">Edit Routine</a>
            <button id="btnRetrain" class="btn primary" style="flex:2; min-width: 250px;">🤖 Sync & Retrain AI Profile</button>
        </div>
        <div id="retrainStatus" style="width:100%; text-align:center; font-size:0.9rem; margin-top:5px;"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const dataStr = localStorage.getItem("lastPrediction");
            if(dataStr) {
                const data = JSON.parse(dataStr);
                
                document.getElementById("resCurr").innerText = data.glucose;
                document.getElementById("resExplanation").innerText = data.explanation;
                document.getElementById("resDipTime").innerText = data.time_to_dip || "Stable";
                
                const sb = document.getElementById("resSuggestion");
                const alertB = document.getElementById("alertBox");
                const adviceCont = document.getElementById("adviceContainer");

                if(data.risk_level === 'HIGH' || data.time_to_dip !== 'Stable') {
                    if (data.time_to_dip === 'Stable') {
                         document.getElementById("resDipTime").style.color = "var(--danger)";
                    } else {
                         document.getElementById("resDipTime").style.color = "var(--warning)";
                    }
                    alertB.style.display = "block";
                    alertB.style.borderColor = "var(--warning)";
                    document.getElementById("alertTitle").innerText = "Impending Drop Detected";
                    sb.style.color = "var(--warning)";
                    sb.innerText = "Prepare a fast-acting carb source nearby. AI shows a steep curve downward.";
                    adviceCont.style.borderColor = "rgba(239, 68, 68, 0.4)";
                } else {
                    document.getElementById("resDipTime").style.color = "var(--success)";
                    sb.style.color = "var(--success)";
                    sb.innerText = "Your predicted trajectory is stable. No action required.";
                    adviceCont.style.borderColor = "rgba(255,255,255,0.1)";
                }

                // Plot the 12-hour simulation curve
                if(data.trajectory_labels && data.trajectory_data) {
                    const ctx = document.getElementById('dailyChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.trajectory_labels,
                            datasets: [{
                                label: "Predicted Glucose Curve",
                                data: data.trajectory_data,
                                borderColor: '#a855f7', // Purplish AI feel
                                backgroundColor: 'rgba(168, 85, 247, 0.1)',
                                borderWidth: 3,
                                fill: true,
                                tension: 0.4, // Smooth curve
                                pointRadius: 0,
                                pointHitRadius: 10
                            },
                            {
                                label: 'Danger Zone (70 mg/dL)',
                                data: Array(data.trajectory_labels.length).fill(70),
                                borderColor: '#ef4444',
                                borderWidth: 1,
                                borderDash: [5, 5],
                                fill: false,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    grid: { color: 'rgba(255,255,255,0.05)' },
                                    ticks: { color: '#94a3b8' }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#94a3b8', maxTicksLimit: 8 }
                                }
                            },
                            plugins: {
                                legend: { labels: { color: '#f8fafc' } }
                            }
                        }
                    });
                }
            } else {
                // No recent input, go to home
                window.location.href = "/";
            }

            // Retrain Feature Setup
            document.getElementById("btnRetrain").addEventListener("click", async (e) => {
                const btn = e.target;
                const status = document.getElementById("retrainStatus");
                
                btn.innerText = "Syncing & Training...";
                btn.disabled = true;
                status.innerText = "Pushing recent database logs to model, please wait...";
                status.style.color = "var(--text-muted)";

                try {
                    const res = await fetch('/api/retrain', { method: 'POST' });
                    const dat = await res.json();
                    
                    if(res.ok) {
                        status.innerText = dat.message;
                        status.style.color = "var(--success)";
                    } else {
                        status.innerText = dat.message || "Error retraining model.";
                        status.style.color = "var(--danger)";
                    }
                } catch(err) {
                    status.innerText = "Network Error. Could not trigger retraining.";
                    status.style.color = "var(--danger)";
                } finally {
                    btn.innerText = "🤖 Sync & Retrain AI Profile";
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
