<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            max-width: 800px;
        }
        .advice-box { background: rgba(0,0,0,0.2); padding:20px; border-radius:12px; margin-top:20px; width:100%; border:1px solid rgba(255,255,255,0.1); }
        .chart-container { width: 100%; height: 300px; margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>
    <div class="glass-container page-wrapper" style="max-width:800px;">
        <header>
            <h1>Status Dashboard</h1>
        </header>

        <div id="alertBox" class="alert-box" style="width: 100%; display:none;">
            <h3 id="alertTitle">⚠️ High Risk of Hypoglycemia</h3>
            <p>Your blood glucose is expected to drop dangerously low.</p>
        </div>

        <div class="results-grid" style="width:100%; grid-template-columns: 1fr 1fr 1fr;">
            <div class="stat-card" style="text-align:center;">
                <h3>Current Level</h3>
                <p id="resCurr" class="highlight">-</p>
                <span style="font-size:0.8rem; color:var(--text-muted);">mg/dL</span>
            </div>
            <div class="stat-card" style="text-align:center;">
                <h3>Risk Level</h3>
                <p id="resRisk" class="highlight">-</p>
            </div>
            <div class="stat-card" style="text-align:center;">
                <h3>Next Probable Dip</h3>
                <p id="resDipTime" class="highlight" style="font-size:1.2rem;">-</p>
            </div>
        </div>

        <div class="advice-box">
            <h3 style="margin-bottom:10px;">Why?</h3>
            <p id="resExplanation" class="text-sm" style="color:#cbd5e1;">-</p>
            
            <h3 style="margin-top:20px; margin-bottom:10px;">Suggestion</h3>
            <p id="resSuggestion" class="text-sm" style="font-weight: 600;">-</p>
        </div>

        <div class="chart-container">
            <canvas id="dailyChart"></canvas>
        </div>

        <div style="display:flex; width:100%; gap:15px; margin-top:20px;">
            <a href="/" class="btn secondary" style="flex:1;">Log Another Reading</a>
            <a href="/setup" class="btn secondary" style="flex:1;">Edit Routine Settings</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const dataStr = localStorage.getItem("lastPrediction");
            if(dataStr) {
                const data = JSON.parse(dataStr);
                
                document.getElementById("resCurr").innerText = data.glucose;
                document.getElementById("resRisk").innerText = data.risk_level;
                document.getElementById("resExplanation").innerText = data.explanation;
                document.getElementById("resDipTime").innerText = data.time_to_dip || "Stable";
                
                const sb = document.getElementById("resSuggestion");
                const alertB = document.getElementById("alertBox");

                if(data.risk_level === 'HIGH') {
                    document.getElementById("resRisk").style.color = "var(--danger)";
                    document.getElementById("resDipTime").style.color = "var(--danger)";
                    alertB.style.display = "block";
                    alertB.style.borderColor = "var(--danger)";
                    sb.style.color = "var(--danger)";
                    sb.innerText = "Eat 15g of fast-acting carbohydrates immediately and check glucose again in 15 minutes.";
                } else if(data.risk_level === 'MEDIUM') {
                    document.getElementById("resRisk").style.color = "var(--warning)";
                    document.getElementById("resDipTime").style.color = "var(--warning)";
                    alertB.style.display = "block";
                    alertB.style.borderColor = "var(--warning)";
                    document.getElementById("alertTitle").innerText = "Slight Risk";
                    sb.style.color = "var(--warning)";
                    sb.innerText = "Consider a small snack if you are active, or closely monitor your glucose.";
                } else {
                    document.getElementById("resRisk").style.color = "var(--success)";
                    document.getElementById("resDipTime").style.color = "var(--success)";
                    sb.style.color = "var(--success)";
                    sb.innerText = "You are in a safe range. No action needed right now.";
                }
            }

            // Load Chart
            try {
                const response = await fetch('/history');
                const historyData = await response.json();
                
                const ctx = document.getElementById('dailyChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: historyData.labels,
                        datasets: [{
                            label: "Today's Glucose Levels",
                            data: historyData.data,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.2)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: 'Hypoglycemia Threshold (70)',
                            data: Array(historyData.labels.length).fill(70),
                            borderColor: '#ef4444',
                            borderWidth: 1,
                            borderDash: [5, 5],
                            fill: false,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#94a3b8' }
                            },
                            x: {
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#94a3b8' }
                            }
                        },
                        plugins: {
                            legend: { labels: { color: '#f8fafc' } }
                        }
                    }
                });
            } catch(e) {
                console.error("Failed to load chart data", e);
            }
        });
    </script>
</body>
</html>
